<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1377f2">
    <meta name="description" content="Offline personal collection and inventory tracker for Disney Doorables.">
    <title>Doorables Vault</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="db.js" defer></script>
    <script src="zip-utils.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true">D</div>
        <div class="brand-copy">
          <h1>Doorables Vault</h1>
          <p>Offline collection and inventory tracker</p>
        </div>
      </div>

      <label class="search-box" for="global-search">
        <span class="search-label">Search</span>
        <input id="global-search" type="search" placeholder="Character, series, franchise, rarity">
      </label>
    </header>

    <main id="app-view" class="app-view" tabindex="-1">
      <section class="empty-state">
        <h2>Loading vault...</h2>
        <p>Your local Doorables data is opening from this device.</p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Primary navigation">
      <button class="nav-button is-active" type="button" data-tab="dashboard">
        <span class="nav-icon" aria-hidden="true">01</span>
        <span>Dashboard</span>
      </button>
      <button class="nav-button" type="button" data-tab="collection">
        <span class="nav-icon" aria-hidden="true">02</span>
        <span>Collection</span>
      </button>
      <button class="nav-button" type="button" data-tab="inventory">
        <span class="nav-icon" aria-hidden="true">03</span>
        <span>Inventory</span>
      </button>
      <button class="nav-button" type="button" data-tab="database">
        <span class="nav-icon" aria-hidden="true">04</span>
        <span>Database</span>
      </button>
      <button class="nav-button" type="button" data-tab="analytics">
        <span class="nav-icon" aria-hidden="true">05</span>
        <span>Analytics</span>
      </button>
      <button class="nav-button" type="button" data-tab="settings">
        <span class="nav-icon" aria-hidden="true">06</span>
        <span>Settings</span>
      </button>
    </nav>

    <div class="fab-wrap">
      <div id="fab-menu" class="fab-menu" hidden>
        <button type="button" data-fab-action="bulk">Bulk Add</button>
        <button type="button" data-fab-action="single">Add Single Doorable</button>
        <button type="button" data-fab-action="importMaster">Import Master Database</button>
        <button type="button" data-fab-action="imagePack">Import Image Pack</button>
      </div>
      <button id="fab-button" class="fab-button" type="button" aria-expanded="false" aria-controls="fab-menu">
        <span aria-hidden="true">+</span>
        <span class="sr-only">Open quick actions</span>
      </button>
    </div>

    <div id="modal" class="modal" hidden>
      <button class="modal-backdrop" type="button" data-close-modal aria-label="Close dialog"></button>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <h2 id="modal-title">Details</h2>
          <button class="icon-button" type="button" data-close-modal aria-label="Close">X</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
